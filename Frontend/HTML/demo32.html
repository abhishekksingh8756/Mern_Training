<html>
    <head>
        <style>
            body
            {
                background: #2962FF;
                font-family: Arial, Helvetica, sans-serif;
            }
            #login
            {
                min-height: 300px;;
                width:500px;
                background: white;
                margin: 150px auto;
                border-radius: 10px;
                padding: 50px;
                box-sizing: border-box;
                transition: all 1s;
            }
            #heading
            {  
                font-size: 30px;;
                text-align: center;

            }
            .txt
            {
                height: 45px;
                width:100%;
                margin-bottom: 10px;
                border:none;
                background: #f4f4f4;
                padding-left: 15px;
                box-sizing: border-box;
                color: #2962FF;;
                border-radius: 100px;;

            }
            ::placeholder
            {
                color: #2962FF;;
            }
            .btn
            {
                
                height: 45px;
                width:100%;
                background: #2962FF;;
                color: white;
                border: none;
                border-radius: 100px;

            }
            #login:hover
            {
                background: black;
                color: white;
                transition: all 1s;
            }
            
        </style>
    </head>
    <body>
        <div id="login">
            <div id="heading">LOGIN <b style="color: #2962FF;;">FORM</b></div>
             Userid<br/><input class="txt" type="text" placeholder="Enter Userid...">
             Password<br/> <input placeholder="Enter Password..." class="txt" type="password">
             <input class="btn" type="submit" value="Login">
        
        
        </div>
    </body>
</html>
