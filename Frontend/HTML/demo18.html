<html>
          <head>
          <style>
                    body
                    {
                     background-color: linear-gradient(rgba(0,0,0,.3)),url("a.jpg");
                     background-size: cover;

                    }
                    #outer
                    {
                              min-height: 600px;
                              width: 1200px;
                              margin:100px auto;
                    }
                    #left
                    {
                              min-height: 600px;
                              width: 700px;
                              float:left;
                              padding-top: 200px;
                              padding-left: 50px;
                              padding-right: 50px;
                              box-sizing: border-box;
                              font-size: 20px;
                              text-align: center;
                              color: white;

                    }
                    #right
                    {
                              min-height: 600px;
                              width: 500px;
                              float:left;
                              background: rgba(255,255,255,.4);
                              padding: 50px;
                              box-sizing: border-box;
                              backdrop-filter: blur(3px);
                              border-radius: 10px;
                    }
                    .txt
                    {
                              height: 55px;
                              width:100%;
                               margin-bottom: 20px;
                              padding-left: 20px; 
                              box-sizing: border-box;
                              border: none;
                              background: transparent;
                              border-bottom: 4px solid red;                
                       }
                       .txta
                       {
                          height: 100px;    
                       }
                       .btn
                       {
                              height: 55px;
                              width: 100%;
                              background: red;
                              border: none;
                       }
                       #h
                       {
                              font-size: 40px;
                              text-transform: uppercase;
                              color: white;
                       }
                       ::placeholder
                       {
                              color: red !important;
                       }

          </style>
          </head>
          <body>
                    <div id="outer">
                              <div id="left">
                                        <div id="h"> welcome to <b style="color:red;"> Code Helper </b></div>
                                        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. 
                                                  Sapiente dolorum molestiae soluta, earum itaque adipisci 
                                                  iste consectetur consequatur? Odio, in?
                                        </p>
                                        <button class="btn" style="width: 100px;">LOGIN</button>
                              </div>
                              <div id="right">
                                        <input type="text" placeholder="Name.." class="txt"/><br>
                                        <input type="email" placeholder="Email.." class="txt"/><br.
                                        <input type="number" placeholder="Mobile.No.." class="txt"/><br>
                                        <input type="password" placeholder="Password.." class="txt"/><br>
                                        <button class="btn">SAVE</button>
                                        <br>
                              </div>
                              
                    </div>
          </body>
</html>
