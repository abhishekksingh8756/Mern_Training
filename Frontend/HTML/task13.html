<!DOCTYPE html>
<html>
<head>
    <title>Layout</title>

    <style>

        #outer
        {
            width:500px;
            height:600px;
            background:white;
        }

        #A{
            width:150px;
            height:600px;
            float:left;
        }

        #B{
            width:250px;
            height:600px;
            float:left;
        }

        #C{
            width:100px;
            height:600px;
            float:left;
        }

        #a1{
            width:150px;
            height:140px;
            background:red;
        }

        #a2{
            width:150px;
            height:70px;
            background:pink;
        }

        #a3{
            width:150px;
            height:70px;
            background:orange;
        }

        #a4{
            width:150px;
            height:100px;
            background:skyblue;
        }

        #a5{
            width:150px;
            height:40px;
            background:yellow;
        }

        #a6{
            width:150px;
            height:180px;
            background:green;
        }

        #b1{
            width:250px;
            height:140px;
            background:purple;
        }

        #b2{
            width:250px;
            height:70px;
            background:gray;
        }

        #b3{
            width:250px;
            height:70px;
            background:brown;
        }

        #b4{
            width:250px;
            height:100px;
            background:cyan;
        }

        #b5{
            width:250px;
            height:40px;
            background:gold;
        }

        #b6{
            width:250px;
            height:180px;
            background:lime;
        }

        #c1{
            width:100px;
            height:380px;
            background:blue;
        }

        #c2{
            width:100px;
            height:220px;
            background:black;
        }

    </style>
</head>

<body>

<div id=" outer">

    <div id="A">
        <div id="a1"></div>
        <div id="a2"></div>
        <div id="a3"></div>
        <div id="a4"></div>
        <div id="a5"></div>
        <div id="a6"></div>
    </div>

    <div id="B">
        <div id="b1"></div>
        <div id="b2"></div>
        <div id="b3"></div>
        <div id="b4"></div>
        <div id="b5"></div>
        <div id="b6"></div>
    </div>

    <div id="C">
        <div id="c1"></div>
        <div id="c2"></div>
    </div>

</div>

</body>
</html>
