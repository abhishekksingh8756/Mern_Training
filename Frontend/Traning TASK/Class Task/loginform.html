<html>
<head>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e6e6e6;
}

.main{
    width:850px;
    height:1000px;
    background:#b8f0e6;
    margin:50px auto;
    position:relative;
}

.login{
    width:500px;
    height:650px;
    background:white;
    position:absolute;
    top:175px;
    left:175px;
    box-shadow:0px 0px 30px gray;
}

.header{
    width:100%;
    height:220px;
    background:#005f78;
    text-align:center;
    padding-top:95px;
}

.header h1{
    color:white;
    font-size:40px;
    font-weight:normal;
}

.line{
    width:120px;
    height:2px;
    background:#9bc3ce;
    margin:8px auto;
}

.form{
    padding:70px;
}

input{
    width:100%;
    border:none;
    border-bottom:2px solid gray;
    outline:none;
    font-size:22px;
    margin-bottom:60px;
    padding-bottom:8px;
}

.btn{
    width:150px;
    height:55px;
    background:#006c88;
    color:white;
    border:none;
    border-radius:15px;
    font-size:24px;
    display:block;
    margin:20px auto;
}

.problem{
    text-align:center;
    color:gray;
    font-size:20px;
}

</style>
</head>
<body>

<div class="main">

    <div class="login">

        <div class="header">
            <h1>LOGIN</h1>
            <div class="line"></div>
        </div>

        <div class="form">

            <input type="text" placeholder="username">

            <input type="password" placeholder="password">

            <button class="btn">login</button>

            <p class="problem">problem?</p>

        </div>

    </div>

</div>

</body>
</html>
