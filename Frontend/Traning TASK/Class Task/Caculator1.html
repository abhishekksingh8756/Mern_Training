<!DOCTYPE html>
<html>
<head>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.calc{
    width:600px;
    height:900px;
    background:#1d181d;
    margin:20px auto;
    border-radius:40px;
    padding-top:60px;
}

.display{
    width:480px;
    height:170px;
    background:white;
    margin:auto;
    border-radius:25px;
    position: relative;

}
.nums
{
          position:absolute;
          right: 20px;
          top: 10px;
          font-size: 120px;
          font-family: 'digital-7',sans-serif;
}

.keys{
    width:480px;
    margin:70px auto;
}

.btn{
    width:110px;
    height:110px;
    background:white;
    float:left;
    margin:5px;
    border-radius:15px;
    text-align:center;
    line-height:110px;
    font-size:70px;
}

</style>
</head>
<body>

<div class="calc">

    <div class="display">
          <div class="nums">0</div>
</div>

    <div class="keys">

        <div class="btn">7</div>
        <div class="btn">8</div>
        <div class="btn">9</div>
        <div class="btn">÷</div>

        <div class="btn">4</div>
        <div class="btn">5</div>
        <div class="btn">6</div>
        <div class="btn">×</div>

        <div class="btn">1</div>
        <div class="btn">2</div>
        <div class="btn">3</div>
        <div class="btn">+</div>

        <div class="btn">0</div>
        <div class="btn">.</div>
        <div class="btn">=</div>
        <div class="btn">-</div>

    </div>

</div>

</body>
</html>
