<html>
<head>
<style>

.calculator{
    width:500px;
    height:800px;
    background:#3f73c9;
    margin:20px auto;
    padding:20px;
    border-radius:10px;
    box-shadow: 10px 10px 1px #3f73c9;
}

.display{
    width:440px;
    height:90px;
    background:black;
    margin:auto;
    color:white;
    font-size:80px;
    text-align:right;
    line-height:90px;
    padding-right:15px;
    margin-bottom:20px;
    box-shadow: -1px 1px 1px white,-5px 5px 2px black;;

}

.btn{
    width:125px;
    height:120px;
    background:#b8d4f0;
    float:left;
    margin:10px;
    margin-right: 31px;
    text-align:center;
    line-height:120px;
    font-size:60px;
    color:white;
    box-shadow: 10px -10px 1px #b8d4f0
}

.long{
    width:290px;
    margin-right: 30px;
}

</style>
</head>
<body>

<div class="calculator">

    <div class="display">413</div>

    <div class="btn">7</div>
    <div class="btn">8</div>
    <div class="btn">9</div>

    <div class="btn">4</div>
    <div class="btn">5</div>
    <div class="btn">6</div>

    <div class="btn">1</div>
    <div class="btn">2</div>
    <div class="btn">3</div>

    <div class="btn">0</div>
    <div class="btn long">+</div>

    <div class="btn">C</div>
    <div class="btn long">=</div>

</div>

</body>
</html>
