<html>
<head>

<style>


body{
    background:#f2f2f2;
}

.clock{
    width:900px;
    height:350px;
    background:#2f2f2f;
    margin:100px auto;
    border-radius:35px;
    border:8px solid silver;
    box-shadow:0px 0px 15px gray inset;
}

.screen{
    width:830px;
    height:250px;
    background:#cfd5d0;
    margin:40px auto;
    border-radius:25px;
    border:5px solid #444;
    text-align:center;
    line-height:250px;
    font-size:170px;
    font-weight:bold;
    color:#071a30;
    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    letter-spacing:8px;
}

.am{
    font-size:50px;
    vertical-align:middle;
}

.base{
    width:180px;
    height:25px;
    background:black;
    margin:-10px auto;
    border-radius:0px 0px 10px 10px;
}

</style>

</head>

<body>

<div class="clock">

    <div class="screen">
        10:38 <span class="am">AM</span>
    </div>

    <div class="base"></div>

</div>

</body>
</html>
