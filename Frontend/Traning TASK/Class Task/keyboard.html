<html>
<head>
<style>

body{
    background:#1f4f9d;
    font-family:Arial,sans-serif;
}

h1{
    color:white;
    font-size:90px;
    font-weight:normal;
    text-align:center;
    margin-top:40px;
}

.cursor{
    width:45px;
    height:150px;
    background:white;
    position:absolute;
    top:40px;
    right:380px;
}

.keyboard{
    width:1360px;
    background:#f2f2f2;
    margin:40px auto;
    padding:10px;
    border:2px solid #cfcfcf;
    border-radius:8px;
    
}

.key{
    width:79px;
    height:58px;
    background:white;
    float:left;
    margin:5px;
    border:1px solid #cfcaca;
    border-radius:10px;
    text-align:center;
    line-height:58px;
    font-size:22px;
}

.back{
    width:130px;
}

.tab{
    width:115px;
}

.caps{
    width:120px;
}

.enter{
    width:180px;
}

.shift{
    width:196px;
}

.space{
    width:1120px;
}

.clear{
    clear:both;
}

</style>

</head>

<body>

<h1>simple-keyboard</h1>

<div class="cursor"></div><br>

<div class="keyboard">
    <div class="key">`</div>
    <div class="key">1</div>
    <div class="key">2</div>
    <div class="key">3</div>
    <div class="key">4</div>
    <div class="key">5</div>
    <div class="key">6</div>
    <div class="key">7</div>
    <div class="key">8</div>
    <div class="key">9</div>
    <div class="key">0</div>
    <div class="key">-</div>
    <div class="key">=</div>
    <div class="key back">Backspace</div>
    <div class="clear"></div>
    <div class="key tab">Tab</div>
    <div class="key">Q</div>
    <div class="key">W</div>
    <div class="key">E</div>
    <div class="key">R</div>
    <div class="key">T</div>
    <div class="key">Y</div>
    <div class="key">U</div>
    <div class="key">I</div>
    <div class="key">O</div>
    <div class="key">P</div>
    <div class="key">[</div>
    <div class="key">]</div>
    <div class="key">\</div>

    <div class="clear"></div>

    <!-- Row 3 -->
    <div class="key caps">Caps</div>
    <div class="key">A</div>
    <div class="key">S</div>
    <div class="key">D</div>
    <div class="key">F</div>
    <div class="key">G</div>
    <div class="key">H</div>
    <div class="key">J</div>
    <div class="key">K</div>
    <div class="key">L</div>
    <div class="key">;</div>
    <div class="key">'</div>
    <div class="key enter">Enter</div>

    <div class="clear"></div>

    <!-- Row 4 -->
    <div class="key shift">Shift</div>
    <div class="key">Z</div>
    <div class="key">X</div>
    <div class="key">C</div>
    <div class="key">V</div>
    <div class="key">B</div>
    <div class="key">N</div>
    <div class="key">M</div>
    <div class="key">,</div>
    <div class="key">.</div>
    <div class="key">/</div>
    <div class="key shift">Shift</div>

    <div class="clear"></div>

    <!-- Row 5 -->
    <div class="key tab">.com</div>
    <div class="key">@</div>
    <div class="key space"></div>

    <div class="clear"></div>

</div>

</body>
</html>
