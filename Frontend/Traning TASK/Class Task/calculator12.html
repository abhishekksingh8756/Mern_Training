<!DOCTYPE html>
<html>
<head>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f2f2;
}

.main{
    width:600px;
    margin:50px auto;
}

.left{
    width:90px;
    height:520px;
    background:#ececec;
    float:left;
}

.calc{
    width:380px;
    height:520px;
    background:#f3f3f3;
    border:2px solid #cfcfcf;
    float:left;
    margin:0 20px;
    margin-left: 13px;
    padding:20px;
}

.right{
    width:90px;
    height:520px;
    background:#ececec;
    float:left;
}

.display{
    width:95%;
    height:50px;
    background:white;
    border:2px solid #c7c7c7;
    margin-bottom:15px;
}

.btn{
    width:75px;
    height:55px;
    background:#dddddd;
    float:left;
    margin:3px;
    border:1px solid #c9c9c9;
    text-align:center;
    line-height:55px;
    font-size:20px;
    font-family:Arial;
    font-weight:bold;
    border-radius: 10%;
}

.btnn{
    width:75px;
    height:55px;
    float:left;
    margin:3px;
    text-align:center;
    line-height:40px;
    background:rgb(255,255,255);
    border:1px ;
    border-radius: 10%;
    font-weight: bold;
}

.op{
    background:#ffd400;
    border-radius: 10px;
}

.clear{
    clear:both;
}

</style>
</head>
<body>

<div class="main">

    <div class="left"></div>

    <div class="calc">

        <div class="display"></div>

        <div class="btn">mc</div>
        <div class="btn">mr</div>
        <div class="btn">m-</div>
        <div class="btn">m+</div>
        <div class="clear"></div>

        <div class="btn">AC</div>
        <div class="btn">√x</div>
        <div class="btn">%</div>
        <div class="btn op">÷</div>
        <div class="clear"></div>

        <div class="btnn">7</div>
        <div class="btnn">8</div>
        <div class="btnn">9</div>
        <div class="btn op">×</div>
        <div class="clear"></div>

        <div class="btnn">4</div>
        <div class="btnn">5</div>
        <div class="btnn">6</div>
        <div class="btn op">−</div>
        <div class="clear"></div>

        <div class="btnn">1</div>
        <div class="btnn">2</div>
        <div class="btnn">3</div>
        <div class="btn op">+</div>
        <div class="clear"></div>

        <div class="btnn">0</div>
        <div class="btnn">.</div>
        <div class="btnn">+/-</div>
        <div class="btn op">=</div>
        <div class="clear"></div>

        <div class="btn">π</div>
        <div class="btn">x²</div>
        <div class="btn">R2</div>
        <div class="btn">R0</div>

    </div>

    <div class="right"></div>

</div>

</body>
</html>
