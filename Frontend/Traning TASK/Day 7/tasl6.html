<!DOCTYPE html>
<html>
<head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.main{
    width:1000px;
    height:700px;
    margin:20px auto;
    background:#ddd;
    padding:10px;
}

.header{
    width:100%;
    height:60px;
    background:gold;
    border:4px solid black;
    line-height:60px;
    padding-left:20px;
    margin-bottom:20px;
}

.left{
    width:16%;
    height:500px;
    background:gold;
    border:4px solid black;
    float:left;
    padding:20px;
}

.right{
    width:82%;
    height:500px;
    background:#d9d9d9;
    border:4px solid black;
    float:right;
    padding:15px;
}

.top{
    width:100%;
    height:80px;
    background:gold;
    border:4px solid black;
    margin-bottom:20px;
}

.btn{
    width:110px;
    height:45px;
    background:skyblue;
    border:4px solid black;
    border-radius:15px;
    float:left;
    margin:15px;
    text-align:center;
    line-height:40px;
}

.text{
    float:left;
    margin-top:28px;
    margin-left:20px;
}

.map{
    width:100%;
    height:365px;
    background:lightblue;
    border:4px solid black;
    text-align:center;
    line-height:365px;
    font-size:25px;
}

.footer{
    clear:both;
    width:100%;
    height:60px;
    background:gold;
    border:4px solid black;
    line-height:60px;
    padding-left:20px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="main">

    <div class="header">header</div>

    <div class="left">menu</div>

    <div class="right">

        <div class="top">
            <div class="btn">tool1</div>
            <div class="btn">tool2</div>
            <div class="btn">tool3</div>
            <div class="text">nav bar with buttons</div>
        </div>

        <div class="map">map</div>

    </div>

    <div class="footer">footer</div>

</div>

</body>
</html>
