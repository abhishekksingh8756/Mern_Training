<html>
<head>
<style>

body{
    background:#f2f2f2;
    font-family:Arial,sans-serif;
}

.main{
    width:900px;
    height:650px;
    background:#f8a9ad;
    margin:30px auto;
    padding:20px;
}

.header{
    width:100%;
    height:80px;
    background:#99d4cf;
    text-align:center;
    line-height:80px;
    color:white;
    font-size:35px;
    font-weight:bold;
}

.middle{
    width:100%;
    height:430px;
    margin-top:20px;
}

.aside{
    width:30%;
    height:100%;
    background:#66b7ba;
    float:left;
    text-align:center;
    line-height:430px;
    color:white;
    font-size:35px;
    font-weight:bold;
}

.article{
    width:67%;
    height:100%;
    background:#f26f73;
    float:right;
    position:relative;
    text-align:center;
}

.article h2{
    color:white;
    margin-top:170px;
    font-size:35px;
}

.img{
    width:150px;
    height:150px;
    background:#ddd;
    float:left;
    margin-left:18px;
    margin-top:30px;
    text-align:center;
    line-height:150px;
    color:white;
    font-size:28px;
}

.footer{
    clear:both;
    width:100%;
    height:80px;
    background:#99d4cf;
    margin-top:20px;
    text-align:center;
    line-height:80px;
    color:white;
    font-size:35px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="main">

    <div class="header">Header</div>

    <div class="middle">

        <div class="aside">Aside</div>

        <div class="article">
            <h2>Article</h2>

            <div class="img">Image</div>
            <div class="img">Image</div>
            <div class="img">Image</div>

        </div>

    </div>

    <div class="footer">Footer</div>

</div>

</body>
</html>
