<!DOCTYPE html>
<html>
<head>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.main{
    width:900px;
    height:550px;
    border:4px dashed lightgray;
    background:#eef2f5;
    margin:30px auto;
    position:relative;
}

.margin{
    text-align:center;
    font-size:45px;
    font-weight:bold;
    margin-top:20px;
}

.border{
    width:720px;
    height:370px;
    background:#0aa6c2;
    margin:20px auto;
    position:relative;
}

.border h2{
    text-align:center;
    color:white;
    padding-top:10px;
}

.padding{
    width:600px;
    height:250px;
    background:#ff7b5a;
    margin:20px auto;
    position:relative;
}

.padding h2{
    text-align:center;
    color:white;
    padding-top:10px;
}

.content{
    width:300px;
    height:130px;
    background:white;
    border:2px dashed lightgray;
    position:absolute;
    top:70px;
    left:150px;
    text-align:center;
    line-height:130px;
    font-size:35px;
}

</style>
</head>

<body>

<div class="main">

    <div class="margin">Margin</div>

    <div class="border">

        <h2>Border</h2>

        <div class="padding">

            <h2>Padding</h2>

            <div class="content">
                Content
            </div>

        </div>

    </div>

</div>

</body>
</html>
