<html>
<head>

<style>

body{
    background:#eeeeee;
    font-family:Arial,sans-serif;
}

.container{
    width:1000px;
    height:650px;
    margin:20px auto;
    background:white;
    padding:10px;
}

.header{
    width:100%;
    height:90px;
    background:#4d8bc8;
    color:white;
    text-align:center;
    line-height:90px;
    font-size:30px;
    font-weight:bold;
}

.sidebar{
    width:33%;
    height:430px;
    background:#d55643;
    float:left;
    margin-top:10px;
    color:white;
    text-align:center;
    line-height:430px;
    font-size:30px;
    font-weight:bold;
}

.main{
    width:66%;
    height:430px;
    background:#69c476;
    float:right;
    margin-top:10px;
    text-align:center;
}

.main h2{
    color:white;
    margin:25px 0;
    font-size:35px;
}

.box{
    width:170px;
    height:65px;
    background:#000033;
    color:white;
    float:left;
    margin:8px;
    line-height:65px;
    font-size:22px;
    font-weight:bold;
}

.footer{
    clear:both;
    width:100%;
    height:90px;
    background:#e3a13a;
    margin-top:10px;
    color:white;
    text-align:center;
    line-height:90px;
    font-size:30px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

    <div class="header">Header</div>

    <div class="sidebar">Sidebar</div>

    <div class="main">

        <h2>Main Content</h2>

        <div class="box">Option 1</div>
        <div class="box">Option 2</div>
        <div class="box">Option 3</div>

        <div class="box">Option 4</div>
        <div class="box">Option 5</div>
        <div class="box">Option 6</div>

        <div class="box">Option 7</div>
        <div class="box">Option 8</div>
        <div class="box">Option 9</div>

        <div class="box">Option 10</div>

    </div>

    <div class="footer">Footer</div>

</div>

</body>
</html>
