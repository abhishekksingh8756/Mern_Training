<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#ececec;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:400px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.header{
    height:140px;
    background:linear-gradient(90deg,#ff4b5c,#b84dff,#20c4ff);
    display:flex;
    justify-content:center;
    align-items:center;
}

.header h2{
    color:#fff;
    font-weight:bold;
}

.form-area{
    padding:40px;
}

.form-control{
    height:55px;
    border-radius:35px;
    border:2px solid #ccc;
    padding-left:25px;
    font-size:18px;
    margin-bottom:25px;
}

.form-control:focus{
    box-shadow:none;
    border-color:#b84dff;
}

.btn-login{
    width:100%;
    height:55px;
    border:none;
    border-radius:35px;
    color:#fff;
    font-size:22px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff4b5c,#b84dff,#20c4ff);
}

.bottom-text{
    text-align:center;
    margin-top:25px;
    font-size:18px;
}

.bottom-text a{
    font-weight:bold;
}
</style>

</head>

<body>

<div class="login-box">

    <div class="header">
        <h2>Login Form</h2>
    </div>

    <div class="form-area">

        <form>

            <input type="email"
                   class="form-control"
                   placeholder="Email Address">

            <input type="password"
                   class="form-control"
                   placeholder="Password">

            <button class="btn btn-login">
                Login
            </button>

        </form>

        <div class="bottom-text">
            Not a member?
            <a href="#">Signup now</a>
        </div>

    </div>

</div>

</body>
</html>
