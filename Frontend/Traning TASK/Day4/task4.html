.login-card{
    width:350px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.3);
    border-radius:20px;
}

.form-control{
    background:transparent;
    color:white;
}

.form-control::placeholder{
    color:#eee;
}

.form-control:focus{
    background:transparent;
    color:white;
    box-shadow:none;
}

.input-group-text{
    background:transparent;
    color:white;
}

.form-check-label,
a,
p,
h2{
    color:white;
}

.btn-login{
    border-radius:30px;
}

<body>

<div class="container login-container d-flex justify-content-center align-items-center">

<div class="card login-card p-4">

<h2 class="text-center fw-bold mb-4">Login</h2>

<form>

<div class="input-group mb-3">

<input type="email" class="form-control rounded-start-pill" placeholder="Email ID">

<span class="input-group-text rounded-end-pill">
<i class="bi bi-envelope-fill"></i>
</span>

</div>

<div class="input-group mb-3">

<input type="password" class="form-control rounded-start-pill" placeholder="Password">

<span class="input-group-text rounded-end-pill">
<i class="bi bi-lock-fill"></i>
</span>

</div>

<div class="d-flex justify-content-between mb-3">

<div class="form-check">

<input class="form-check-input" type="checkbox" id="remember">

<label class="form-check-label" for="remember">
Remember me
</label>

</div>

<a href="#" class="text-decoration-none">Forgot Password?</a>

</div>

<div class="d-grid">

<button class="btn btn-light text-dark fw-bold btn-login">
Login
</button>

</div>

<p class="text-center mt-3 mb-0">
Don't have an account?
<a href="#" class="fw-bold text-decoration-none">Register</a>
</p>

</form>

</div>

</div>

</body>
