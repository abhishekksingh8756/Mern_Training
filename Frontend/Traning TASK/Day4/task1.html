<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registration Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:linear-gradient(135deg,#6fb6ff,#b05cff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    width:700px;
    border:none;
    border-radius:10px;
    box-shadow:0 8px 25px rgba(0,0,0,.2);
}

.card-body{
    padding:35px;
}

.form-control{
    height:45px;
}

.btn-register{
    background:linear-gradient(to right,#63b4ff,#b04dff);
    color:white;
    font-weight:bold;
    border:none;
    height:45px;
}

.btn-register:hover{
    color:white;
    opacity:.9;
}

h3{
    font-weight:bold;
}

.title-line{
    width:70px;
    height:3px;
    background:#6fb6ff;
    margin-bottom:20px;
}
</style>

</head>
<body>

<div class="card">
<div class="card-body">

<h3>Registration</h3>
<div class="title-line"></div>

<form>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" placeholder="Enter your name">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Username</label>
<input type="text" class="form-control" placeholder="Enter your username">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter your email">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Phone Number</label>
<input type="text" class="form-control" placeholder="Enter your number">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Password</label>
<input type="password" class="form-control" placeholder="Enter your password">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" class="form-control" placeholder="Confirm your password">
</div>

</div>

<h5 class="mt-3 mb-3">Gender</h5>

<div class="row mb-4">

<div class="col-md-3">
<div class="form-check">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Male</label>
</div>
</div>

<div class="col-md-3">
<div class="form-check">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Female</label>
</div>
</div>

<div class="col-md-6">
<div class="form-check">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Prefer not to say</label>
</div>
</div>

</div>

<div class="d-grid">
<button class="btn btn-register">Register</button>
</div>

</form>

</div>
</div>

</body>
</html>
