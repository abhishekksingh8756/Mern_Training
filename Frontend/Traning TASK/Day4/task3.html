<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#12002f,#1c0f54,#21002d);
padding:40px;
}

body::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:#00bfff;
border-radius:50%;
filter:blur(90px);
left:0;
bottom:0;
opacity:.6;
}

body::after{
content:"";
position:absolute;
width:220px;
height:220px;
background:#ff007f;
border-radius:50%;
filter:blur(90px);
right:100px;
top:150px;
opacity:.4;
}

.form-box{
position:relative;
z-index:1;
width:850px;
background:rgba(255,255,255,.05);
border:2px solid rgba(255,255,255,.2);
backdrop-filter:blur(15px);
padding:45px;
border-radius:25px;
color:white;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

.form-title{
text-align:center;
margin-bottom:35px;
}

.form-title h2{
font-weight:bold;
}

.form-control,
.form-select{
background:transparent;
border:none;
border-bottom:2px solid rgba(255,255,255,.6);
border-radius:0;
color:white;
padding-left:35px;
}

.form-control:focus,
.form-select:focus{
background:transparent;
color:white;
box-shadow:none;
border-color:#fff;
}

.form-control::placeholder{
color:#ddd;
}

label{
margin-bottom:8px;
font-weight:500;
}

.input-icon{
position:relative;
}

.input-icon i{
position:absolute;
left:8px;
top:12px;
color:#ddd;
}

.btn-register{
background:#ff2f92;
color:white;
border:none;
padding:10px 40px;
border-radius:30px;
font-weight:bold;
}

.btn-register:hover{
background:#ff0077;
color:white;
}

option{
color:black;
}

</style>

</head>

<body>

<div class="form-box">

<div class="form-title">
<h2>Event Registration</h2>
<p>Register with us to get more details.</p>
</div>

<form>

<div class="row">

<div class="col-md-6 mb-4">
<label>First Name</label>
<div class="input-icon">
<i class="bi bi-person"></i>
<input type="text" class="form-control">
</div>
</div>

<div class="col-md-6 mb-4">
<label>Last Name</label>
<input type="text" class="form-control">
</div>

</div>

<div class="mb-4">
<label>Email</label>
<div class="input-icon">
<i class="bi bi-envelope"></i>
<input type="email" class="form-control">
</div>
</div>

<div class="mb-4">
<label>Phone</label>
<div class="input-icon">
<i class="bi bi-phone"></i>
<input type="tel" class="form-control">
</div>
</div>

<div class="mb-4">
<label>Topic</label>
<select class="form-select">
<option>Select Topic</option>
<option>Web Development</option>
<option>AI & ML</option>
<option>Cloud Computing</option>
<option>Cyber Security</option>
</select>
</div>

<div class="mb-4">
<label>Preferred Slot</label>
<select class="form-select">
<option>Select Slot</option>
<option>09:00 AM</option>
<option>11:00 AM</option>
<option>02:00 PM</option>
<option>04:00 PM</option>
</select>
</div>

<div class="text-center mt-5">
<button class="btn btn-register">
Sign me up
</button>
</div>

</form>

</div>

</body>
</html>
